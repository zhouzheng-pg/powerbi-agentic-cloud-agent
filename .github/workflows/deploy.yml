name: deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/**"

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      workspace:
        type: string
        description: The name of the workspace to deploy to
        required: true
        default: "powerbi-agentic-mcp-cloud-agent"
      environment:
        type: choice
        description: The environment to deploy to
        required: true
        default: "DEV"
        options:
          - DEV
          - PRD

jobs:
  deploy:    
    runs-on: ubuntu-latest
    environment: &environment_name ${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.event_name == 'pull_request' && github.base_ref == 'main' && 'DEV' || github.event_name == 'push' && github.ref == 'refs/heads/main' && 'PRD' || 'DEV' }}
    env:
      environment_name: *environment_name

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install -r scripts/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Run Deployment Script
        run: >
          python scripts/deploy.py
          --spn-auth True
          --workspace_name "${{ github.event_name == 'workflow_dispatch' && inputs.workspace || '' }}"
          --environment "${{ env.environment_name }}"