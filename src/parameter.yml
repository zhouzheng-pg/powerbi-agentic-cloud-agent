
# Semantic model parameters (find & replace over TMDL M parameter expression)

find_replace:
    - find_value: expression\s+Environment\s*=\s*"(.*?)"
      replace_value:
          DEV: "DEV"
          PRD: "PRD"
      is_regex: "true" # use regex to find the expression parameter assignment
      item_type: "SemanticModel" # filter on SemanticModel files
      file_path: "**/expressions.tmdl"

# Ensure default page per report (I used the same page name for all first pages)

key_value_replace:
    - find_key: $..activePageName
      replace_value:
          DEV: ReportSection89a9619c7025093ade1c
          PRD: ReportSection6687c48ea8a9b7740002
      file_path: 
        - "Sales.Report/definition/pages/pages.json"